env:
  JULIA_NUM_THREADS: auto

secrets:
  - CODECOV_TOKEN

steps:
  - label: "General Tests"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - QuantumSavory/julia-xvfb#v1:
      - JuliaCI/julia-test#v1:
          test_args: "general"
      - JuliaCI/julia-coverage#v1:
          codecov: true
  - label: "JET Tests"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - QuantumSavory/julia-xvfb#v1:
      - JuliaCI/julia-test#v1:
          test_args: "jet"
      - JuliaCI/julia-coverage#v1:
          codecov: true
  - label: "Example Tests"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - QuantumSavory/julia-xvfb#v1:
      - JuliaCI/julia-test#v1:
          test_args: "example"
      - JuliaCI/julia-coverage#v1:
          codecov: true
  - label: "Plotting Tests"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - QuantumSavory/julia-xvfb#v1:
      - JuliaCI/julia-test#v1:
          test_args: "plotting"
      - JuliaCI/julia-coverage#v1:
          codecov: true
  - label: "Docs"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - QuantumSavory/julia-xvfb#v1:
    secrets:
      - DOCUMENTER_KEY
      - ANYTHINGLLM_API_KEY
    command: |
      julia --project=docs -e 'using Pkg; Pkg.instantiate()'
      julia -tauto --project=docs docs/make.jl
